name: Nightly Audit

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  docs-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run docs checks
        run: bash scripts/check-docs.sh

  notify-lark:
    needs: [docs-audit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Notify Lark
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LARK_BOT_WEBHOOK: ${{ secrets.LARK_BOT_WEBHOOK }}
          LARK_BOT_SECRET: ${{ secrets.LARK_BOT_SECRET }}
          WORKFLOW_RESULT: ${{ needs.docs-audit.result }}
        run: bash templates/github/child-repos/scripts/lark-notify.sh "$WORKFLOW_RESULT"
