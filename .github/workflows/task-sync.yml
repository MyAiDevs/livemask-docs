name: Task Sync and Auto Marking

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: TASK ID, for example TASK-P0-03
        required: true
      result:
        description: implemented / verified / completed / completed_with_skip / blocked / deferred
        required: true
        default: implemented
        type: choice
        options:
          - implemented
          - verified
          - completed
          - completed_with_skip
          - blocked
          - deferred
      repo:
        description: Repository producing this status event, for example livemask-backend
        required: false
        default: ""
      parent_task_id:
        description: Parent/Epic TASK ID if this is a child task
        required: false
        default: ""
      summary:
        description: Summary of completed work
        required: true
      verification:
        description: Tests, CI, smoke, or manual evidence
        required: false
        default: ""
      implementation_status:
        description: Implementation state, commit, files, or no-code reason
        required: false
        default: ""
      verification_status:
        description: Unit/build/smoke/docs verification status
        required: false
        default: ""
      task_branch:
        description: Task branch merged into dev, or none if developed directly on dev
        required: false
        default: ""
      task_branch_commit:
        description: Commit on the task branch
        required: false
        default: ""
      dev_merge_commit:
        description: Required for completed. Merge commit or dev commit after guarded merge
        required: false
        default: ""
      remote_dev_ref:
        description: Required for completed. origin/dev ref after push
        required: false
        default: ""
      skip_count:
        description: Number of smoke/verification SKIP paths
        required: false
        default: "0"
      blockers:
        description: Concrete blockers or none
        required: false
        default: ""
      issue_action:
        description: comment_only / ready_for_review / close_child_issue / keep_parent_open / reopen_required
        required: false
        default: comment_only
        type: choice
        options:
          - comment_only
          - ready_for_review
          - close_child_issue
          - keep_parent_open
          - reopen_required
      should_close_issue:
        description: Defaults false. Automation does not close issues in this workflow.
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      unlocked_repos:
        description: Comma-separated repos to notify, for example livemask-admin,livemask-app
        required: false
        default: ""
      blocked_repos:
        description: Comma-separated repos still blocked
        required: false
        default: ""
      next_steps:
        description: Next task or action
        required: false
        default: ""
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  parse-comment:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.comment.user.type != 'Bot'
      && contains(github.event.comment.body, 'TASK-')
      && (contains(github.event.comment.body, '/task-sync') || contains(github.event.comment.body, '## 任务完成报告') || contains(github.event.comment.body, '## Task Completion Report'))
    runs-on: ubuntu-latest
    outputs:
      task_id: ${{ steps.parse.outputs.task_id }}
      result: ${{ steps.parse.outputs.result }}
      summary: ${{ steps.parse.outputs.summary }}
      verification: ${{ steps.parse.outputs.verification }}
      repo: ${{ steps.parse.outputs.repo }}
      parent_task_id: ${{ steps.parse.outputs.parent_task_id }}
      implementation_status: ${{ steps.parse.outputs.implementation_status }}
      verification_status: ${{ steps.parse.outputs.verification_status }}
      task_branch: ${{ steps.parse.outputs.task_branch }}
      task_branch_commit: ${{ steps.parse.outputs.task_branch_commit }}
      dev_merge_commit: ${{ steps.parse.outputs.dev_merge_commit }}
      remote_dev_ref: ${{ steps.parse.outputs.remote_dev_ref }}
      skip_count: ${{ steps.parse.outputs.skip_count }}
      blockers: ${{ steps.parse.outputs.blockers }}
      issue_action: ${{ steps.parse.outputs.issue_action }}
      should_close_issue: ${{ steps.parse.outputs.should_close_issue }}
      unlocked_repos: ${{ steps.parse.outputs.unlocked_repos }}
      blocked_repos: ${{ steps.parse.outputs.blocked_repos }}
      next_steps: ${{ steps.parse.outputs.next_steps }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse issue comment
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          python3 - <<'PY'
          import os
          import re

          body = os.environ["COMMENT_BODY"]
          task = re.search(r"TASK-[A-Z0-9]+(?:-[A-Z0-9]+)*", body)
          result = re.search(r"\*\*Result\*\*:\s*(implemented|verified|completed|completed_with_skip|partial|blocked|deferred)", body, re.I)
          if not result:
              result = re.search(r"\*\*结果\*\*:\s*(implemented|verified|completed|completed_with_skip|partial|blocked|deferred|已实现|已验证|已完成|带跳过完成|部分完成|阻塞|延期)", body, re.I)
          result_map = {
              "已实现": "implemented",
              "已验证": "verified",
              "已完成": "completed",
              "带跳过完成": "completed_with_skip",
              "部分完成": "implemented",
              "阻塞": "blocked",
              "延期": "deferred",
          }
          result_value = result_map.get(result.group(1), result.group(1).lower()) if result else "implemented"

          def section(title):
              pattern = rf"### {re.escape(title)}\n(.*?)(?=\n### |\Z)"
              match = re.search(pattern, body, re.S)
              return match.group(1).strip() if match else ""

          def repos(title):
              text = section(title)
              found = re.findall(r"livemask-[a-z-]+", text)
              return ",".join(dict.fromkeys(found))

          summary = section("Summary") or section("已完成内容") or body[:500]
          verification = section("Verification") or section("测试与验证")
          implementation_status = section("Implementation Status") or section("实现状态")
          verification_status = section("Verification Status") or section("验证状态")
          blockers = section("Blockers") or section("blockers") or section("阻塞项")
          skip_count_match = re.search(r"\*\*Skip Count\*\*:\s*(\d+)", body, re.I) or re.search(r"skip_count:\s*(\d+)", body, re.I)
          skip_count = skip_count_match.group(1) if skip_count_match else "0"
          task_branch_match = re.search(r"\*\*Task Branch(?: / Commit)?\*\*:\s*([^\n]+)", body, re.I) or re.search(r"task_branch:\s*([^\n]+)", body, re.I)
          task_branch_value = task_branch_match.group(1).strip() if task_branch_match else ""
          task_branch = task_branch_value.split()[0] if task_branch_value else ""
          task_branch_commit_match = re.search(r"\*\*Task Branch Commit\*\*:\s*([0-9a-f]{7,40})", body, re.I) or re.search(r"task_branch_commit:\s*([0-9a-f]{7,40})", body, re.I)
          task_branch_commit = task_branch_commit_match.group(1) if task_branch_commit_match else ""
          if not task_branch_commit and task_branch_value:
              commit_in_branch = re.search(r"\b([0-9a-f]{7,40})\b", task_branch_value, re.I)
              task_branch_commit = commit_in_branch.group(1) if commit_in_branch else ""
          dev_merge_match = re.search(r"\*\*Dev Merge Commit\*\*:\s*([0-9a-f]{7,40})", body, re.I) or re.search(r"dev_merge_commit:\s*([0-9a-f]{7,40})", body, re.I)
          dev_merge_commit = dev_merge_match.group(1) if dev_merge_match else ""
          remote_dev_match = re.search(r"\*\*Remote dev Ref\*\*:\s*([0-9a-f]{7,40})", body, re.I) or re.search(r"remote_dev_ref:\s*([0-9a-f]{7,40})", body, re.I)
          remote_dev_ref = remote_dev_match.group(1) if remote_dev_match else ""
          repo_match = re.search(r"\*\*Repo\*\*:\s*(livemask-[a-z-]+)", body, re.I) or re.search(r"repo:\s*(livemask-[a-z-]+)", body, re.I)
          repo = repo_match.group(1) if repo_match else ""
          parent_match = re.search(r"\*\*Parent TASK ID\*\*:\s*(TASK-[A-Z0-9]+(?:-[A-Z0-9]+)*)", body, re.I) or re.search(r"parent_task_id:\s*(TASK-[A-Z0-9]+(?:-[A-Z0-9]+)*)", body, re.I)
          parent_task_id = parent_match.group(1) if parent_match else ""
          issue_action_match = re.search(r"\*\*Issue Action\*\*:\s*(comment_only|ready_for_review|close_child_issue|keep_parent_open|reopen_required)", body, re.I) or re.search(r"issue_action:\s*(comment_only|ready_for_review|close_child_issue|keep_parent_open|reopen_required)", body, re.I)
          issue_action = issue_action_match.group(1).lower() if issue_action_match else "comment_only"
          should_close_match = re.search(r"\*\*Should Close Issue\*\*:\s*(true|false)", body, re.I) or re.search(r"should_close_issue:\s*(true|false)", body, re.I)
          should_close_issue = should_close_match.group(1).lower() if should_close_match else "false"
          next_steps = section("Next Steps") or section("下一步建议")
          unlocked = repos("Unlocked Repositories") or repos("已解锁的后续开发窗口")
          blocked = repos("Blocked Repositories") or repos("仍然阻塞的窗口")
          if not unlocked:
              impact = section("跨端影响与解锁状态") or section("Cross-Repo Impact")
              unlocked_found = []
              blocked_found = []
              for line in impact.splitlines():
                  repo_match = re.search(r"livemask-[a-z-]+", line)
                  if not repo_match:
                      continue
                  if "可并行" in line or "已完成" in line or "unlocked" in line.lower() or "ready" in line.lower():
                      unlocked_found.append(repo_match.group(0))
                  if "阻塞" in line or "blocked" in line.lower():
                      blocked_found.append(repo_match.group(0))
              unlocked = ",".join(dict.fromkeys(unlocked_found))
              blocked = blocked or ",".join(dict.fromkeys(blocked_found))

          out = os.environ["GITHUB_OUTPUT"]
          values = {
              "task_id": task.group(0) if task else "",
              "result": result_value,
              "repo": repo,
              "parent_task_id": parent_task_id,
              "summary": summary,
              "verification": verification,
              "implementation_status": implementation_status,
              "verification_status": verification_status,
              "task_branch": task_branch,
              "task_branch_commit": task_branch_commit,
              "dev_merge_commit": dev_merge_commit,
              "remote_dev_ref": remote_dev_ref,
              "skip_count": skip_count,
              "blockers": blockers,
              "issue_action": issue_action,
              "should_close_issue": should_close_issue,
              "unlocked_repos": unlocked,
              "blocked_repos": blocked,
              "next_steps": next_steps,
          }
          with open(out, "a", encoding="utf-8") as fh:
              for key, value in values.items():
                  if "\n" in value:
                      fh.write(f"{key}<<EOF\n{value}\nEOF\n")
                  else:
                      fh.write(f"{key}={value}\n")
          PY

  sync-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      report_title: ${{ steps.sync.outputs.report_title }}
      report_summary: ${{ steps.sync.outputs.report_summary }}
      report_tasks: ${{ steps.sync.outputs.report_tasks }}
      report_risks: ${{ steps.sync.outputs.report_risks }}
      report_next_steps: ${{ steps.sync.outputs.report_next_steps }}
    steps:
      - uses: actions/checkout@v4
      - name: Sync task
        id: sync
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LIVEMASK_BOT_TOKEN: ${{ secrets.LIVEMASK_BOT_TOKEN }}
        run: |
          python3 scripts/task-sync.py \
            --task-id "${{ inputs.task_id }}" \
            --result "${{ inputs.result }}" \
            --repo "${{ inputs.repo }}" \
            --parent-task-id "${{ inputs.parent_task_id }}" \
            --summary "${{ inputs.summary }}" \
            --verification "${{ inputs.verification }}" \
            --implementation-status "${{ inputs.implementation_status }}" \
            --verification-status "${{ inputs.verification_status }}" \
            --task-branch "${{ inputs.task_branch }}" \
            --task-branch-commit "${{ inputs.task_branch_commit }}" \
            --dev-merge-commit "${{ inputs.dev_merge_commit }}" \
            --remote-dev-ref "${{ inputs.remote_dev_ref }}" \
            --skip-count "${{ inputs.skip_count }}" \
            --blockers "${{ inputs.blockers }}" \
            --issue-action "${{ inputs.issue_action }}" \
            --should-close-issue "${{ inputs.should_close_issue }}" \
            --unlocked-repos "${{ inputs.unlocked_repos }}" \
            --blocked-repos "${{ inputs.blocked_repos }}" \
            --next-steps "${{ inputs.next_steps }}" \
            --source "workflow_dispatch"

  sync-comment:
    needs: [parse-comment]
    if: github.event_name == 'issue_comment' && needs.parse-comment.outputs.task_id != ''
    runs-on: ubuntu-latest
    outputs:
      report_title: ${{ steps.sync.outputs.report_title }}
      report_summary: ${{ steps.sync.outputs.report_summary }}
      report_tasks: ${{ steps.sync.outputs.report_tasks }}
      report_risks: ${{ steps.sync.outputs.report_risks }}
      report_next_steps: ${{ steps.sync.outputs.report_next_steps }}
    steps:
      - uses: actions/checkout@v4
      - name: Sync task from comment
        id: sync
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LIVEMASK_BOT_TOKEN: ${{ secrets.LIVEMASK_BOT_TOKEN }}
        run: |
          python3 scripts/task-sync.py \
            --task-id "${{ needs.parse-comment.outputs.task_id }}" \
            --result "${{ needs.parse-comment.outputs.result }}" \
            --repo "${{ needs.parse-comment.outputs.repo }}" \
            --parent-task-id "${{ needs.parse-comment.outputs.parent_task_id }}" \
            --summary "${{ needs.parse-comment.outputs.summary }}" \
            --verification "${{ needs.parse-comment.outputs.verification }}" \
            --implementation-status "${{ needs.parse-comment.outputs.implementation_status }}" \
            --verification-status "${{ needs.parse-comment.outputs.verification_status }}" \
            --task-branch "${{ needs.parse-comment.outputs.task_branch }}" \
            --task-branch-commit "${{ needs.parse-comment.outputs.task_branch_commit }}" \
            --dev-merge-commit "${{ needs.parse-comment.outputs.dev_merge_commit }}" \
            --remote-dev-ref "${{ needs.parse-comment.outputs.remote_dev_ref }}" \
            --skip-count "${{ needs.parse-comment.outputs.skip_count }}" \
            --blockers "${{ needs.parse-comment.outputs.blockers }}" \
            --issue-action "${{ needs.parse-comment.outputs.issue_action }}" \
            --should-close-issue "${{ needs.parse-comment.outputs.should_close_issue }}" \
            --unlocked-repos "${{ needs.parse-comment.outputs.unlocked_repos }}" \
            --blocked-repos "${{ needs.parse-comment.outputs.blocked_repos }}" \
            --next-steps "${{ needs.parse-comment.outputs.next_steps }}" \
            --source "issue_comment"

  notify-lark:
    needs: [sync-manual, sync-comment]
    if: always() && (needs.sync-manual.result == 'success' || needs.sync-comment.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve report fields
        id: report
        run: |
          {
            echo "title=${{ needs.sync-manual.outputs.report_title || needs.sync-comment.outputs.report_title }}"
            echo "summary=${{ needs.sync-manual.outputs.report_summary || needs.sync-comment.outputs.report_summary }}"
            echo "tasks<<EOF"
            echo "${{ needs.sync-manual.outputs.report_tasks || needs.sync-comment.outputs.report_tasks }}"
            echo "EOF"
            echo "risks=${{ needs.sync-manual.outputs.report_risks || needs.sync-comment.outputs.report_risks }}"
            echo "next_steps=${{ needs.sync-manual.outputs.report_next_steps || needs.sync-comment.outputs.report_next_steps }}"
          } >> "$GITHUB_OUTPUT"
      - name: Send Lark project report
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LARK_BOT_WEBHOOK: ${{ secrets.LARK_BOT_WEBHOOK }}
          LARK_BOT_SECRET: ${{ secrets.LARK_BOT_SECRET }}
          REPORT_KIND: task-sync
          REPORT_TITLE: ${{ steps.report.outputs.title }}
          REPORT_SUMMARY: ${{ steps.report.outputs.summary }}
          REPORT_TASKS: ${{ steps.report.outputs.tasks }}
          REPORT_RISKS: ${{ steps.report.outputs.risks }}
          REPORT_NEXT_STEPS: ${{ steps.report.outputs.next_steps }}
          WORKFLOW_RESULT: success
        run: bash templates/github/child-repos/scripts/lark-notify.sh "$WORKFLOW_RESULT"
