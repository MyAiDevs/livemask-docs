name: Backend CI

on:
  pull_request:
  repository_dispatch:
    types:
      - docs-contract-changed

jobs:
  test:
    runs-on:
      group: livemask-ci
      labels: [self-hosted, linux, livemask, docker, ci]
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: go test ./...
