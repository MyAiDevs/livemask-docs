name: Staging Smoke

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - release-candidate
      - docs-contract-changed

jobs:
  smoke:
    runs-on: [self-hosted, linux, livemask, ci-cd, staging, docker]
    steps:
      - uses: actions/checkout@v4
      - name: Start staging
        run: docker compose -f infra/docker-compose.staging.yml up -d
      - name: Smoke
        run: bash scripts/smoke.sh
