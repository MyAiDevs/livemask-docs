name: Frontend CI

on:
  pull_request:
  repository_dispatch:
    types:
      - docs-contract-changed

jobs:
  build:
    runs-on:
      group: livemask-ci
      labels: [self-hosted, linux, livemask, docker, ci]
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
